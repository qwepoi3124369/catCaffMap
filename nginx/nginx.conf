events {}

http {
    server {
        listen 80;
        location /static/ {
      alias /app/static/;  # 映射容器內的靜態檔案目錄
              # 確保 JavaScript 文件的 MIME 類型是 application/javascript
         types {
            application/javascript js;
            text/css css;
            application/json json;
            # 其他常見的 MIME 類型
        }
        }

        location / {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
