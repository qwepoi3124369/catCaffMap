<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drag and Drop List</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <meta name="csrf-token" content="{{ csrf_token }}">
</head>
<body>
    <ul id="sortable">
        {% for item in items %}
        <li id="item-{{ item.id }}" class="ui-state-default" style="display: flex;flex-direction: row; align-items: center;"><div>{{ item.name }}</div><input></li>
        {% endfor %}
    </ul>

    <script>
     $(function() {
    var csrftoken = $('meta[name="csrf-token"]').attr('content');

    $.ajaxSetup({
        beforeSend: function(xhr, settings) {
            if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type) && !this.crossDomain) {
                xhr.setRequestHeader("X-CSRFToken", csrftoken);
            }
        }
    });

    $("#sortable").sortable({
        update: function(event, ui) {
            
            var newOrder = $(this).sortable('toArray', {attribute: 'id'});
            console.log(newOrder)
            $.post('/test/', {order: newOrder});
        }
    });
    $("#sortable").disableSelection();
});
    </script>
</body>
</html>
