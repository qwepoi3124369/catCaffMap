
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>更改密碼</title>
 <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #035c0c;
            display: flex;

            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;


        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        form {
            background: rgba(255, 255, 255, 0.4); /* Semi-transparent white background */
            padding: 40px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
            z-index: 2; /* Ensures content is above the background */
            position: relative; /* Ensures stacking context */

        }
        button[type="submit"] {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
        button[type="button"] {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
        button[type="button"] a{
            color: white;
            text-decoration: none;
        }
        #earth-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }
        canvas {
            width: 100% !important;
            height: 100% !important; /* Adjust height and width to fill earth-container */
        }



  .errorlist {
    color: red;
    list-style-type: none; /* 如果想拿掉前面的點 */
    margin: 0;
    padding: 0;
  }

    </style>
</head>
<body>
    <div id="earth-container"></div>


<form method="POST" style="my-1">
    <h1>更改密碼</h1>
    <p>使用者名稱 :  {{ request.user }} </p>
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">送出</button>
     <button type="button"><a href="{% url 'map' %}">返回地圖</a></button>
</form>
    <script>
$(".id_password1").change(function(){console.log($(".id_password1").val())})


        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('earth-container').appendChild(renderer.domElement);

        const geometry = new THREE.SphereGeometry(8, 32, 32);
        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load("{% static '8k_earth_daymap.jpg' %}");
        const material = new THREE.MeshBasicMaterial({ map: earthTexture });
        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);
        camera.position.z = 20;

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        animate();

        // Handle window resizing
        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
