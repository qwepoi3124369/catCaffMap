[uwsgi]

wsgi-file = /app/wsgi.py
module = geodjango.wsgi:application
master = true
processes = 4
http-socket= :8000
restart= always
vacumum = true
virtualenv = /app/venv
die-on-term = true
plugins = python3
# 處理 static files，假設 collectstatic 後放在 /app/staticfiles
static-map = /static=/app/StaticFile